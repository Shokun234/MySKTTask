<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MySKTTask</title>
  <meta name="theme-color" content="#0d0f14">
  <link rel="manifest" href="./manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="brand" role="button" tabindex="0" aria-label="กลับสู่แดชบอร์ด">
        <div class="brand-mark">M</div>
        <div>
          <div class="brand-title">MySKTTask</div>
          <div class="brand-sub">Homework hub</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-page="dashboard" aria-current="page"><span>🏠</span>แดชบอร์ด</button>
        <button class="nav-item" data-page="homework"><span>📝</span>การบ้าน <b id="hwBadge" style="display: none">0</b></button>
        <button class="nav-item" data-page="calendar"><span>📅</span>ปฏิทิน</button>
        <button class="nav-item" data-page="summaries"><span>💬</span>สรุปบทเรียน</button>
        <button class="nav-item" data-page="tools"><span>⏱️</span>เครื่องมืออ่านหนังสือ</button>
        <button class="nav-item admin-only" data-page="admin"><span>⚙️</span>Admin</button>
      </nav>

      <div class="sidebar-foot">
        <button id="themeToggle" class="switch-row" type="button">
          <span>Dark / Light</span>
          <span class="switch"><i></i></span>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn" aria-label="เปิดเมนู">☰</button>
        <div>
          <h1 id="pageTitle">แดชบอร์ด</h1>
          <p id="pageHint">ดูงานค้าง ส่งเร็ว และความคืบหน้า</p>
        </div>
        <div class="topbar-actions">
          <button id="syncBtn" class="btn ghost" type="button">🔄 ซิงค์ Sheets</button>
          <button id="adminBtn" class="btn ghost" type="button">🔐 Admin</button>
          <button id="addHwBtn" class="btn primary admin-action" type="button">+ เพิ่มการบ้าน</button>
        </div>
      </header>

      <section class="content">
        <section id="page-dashboard" class="page active"></section>
        <section id="page-homework" class="page"></section>
        <section id="page-calendar" class="page"></section>
        <section id="page-summaries" class="page"></section>
        <section id="page-tools" class="page"></section>
        <section id="page-admin" class="page"></section>
      </section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <input id="restoreInput" type="file" accept="application/json,.json" hidden>
  <input id="csvImportInput" type="file" accept=".csv,text/csv" hidden>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app.js" defer></script>
</body>
</html>
